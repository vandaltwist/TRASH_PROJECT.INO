<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>// NEOMORPH // CYBER BOUTIQUE</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=JetBrains+Mono:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   VARIABLES GLOBALES — source unique de vérité
   Toutes les valeurs lues ici par CSS ET par JS
   ═══════════════════════════════════════════════════ */
:root {
  --grid-columns: 3;
  --gap-spacing: 30px;
  --global-font-size: 1rem;
  --line-height: 1.5;
  --entry-delay: 0ms;
  --hover-scale: 1.05;
  --hover-glow: 0.3;
  --anim-speed: 0.3s;
  --font-family: 'Share Tech Mono', monospace;
  --bg: #0a0a0a;
  --panel-bg: #111111;
  --panel-border: #222222;
  --cyan: #00ff41;
  --orange: #ff8800;
  --text: #c0c0c0;
  --text-dim: #555555;
  --bg-image: none;
  --bg-image-opacity: 0.3;
  --logo-align: center;
  --logo-border-width: 1px;
  --logo-border-color: #222222;
  --logo-padding-x: 40px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-family);
  background: var(--bg);
  color: var(--text);
  font-size: var(--global-font-size);
  line-height: var(--line-height);
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 60px;
}

#bg-overlay {
  position: fixed;
  inset: 0;
  z-index: -1;
  background: var(--bg);
  transition: background 0.3s;
}
#bg-overlay.has-image::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--bg-image) center/cover no-repeat fixed;
  opacity: var(--bg-image-opacity);
  pointer-events: none;
}

.logo-square {
  grid-column: 1 / -1;
  display: none;
  justify-content: var(--logo-align);
  padding: 10px var(--logo-padding-x) 20px;
}
.logo-square.show { display: flex; }
.logo-square img {
  max-width: 100%;
  height: auto;
  max-height: 160px;
  object-fit: contain;
  border: var(--logo-border-width) solid var(--logo-border-color);
  background: transparent;
}

.glitch-header {
  background: var(--bg);
  border-bottom: 2px solid var(--cyan);
  padding: 14px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
}
.glitch-header::after {
  content: '';
  position: absolute;
  bottom: -3px; left: 0; right: 0; height: 1px;
  background: var(--orange);
}
.header-data { display: flex; gap: 24px; }
.header-text { color: var(--cyan); font-size: 0.75rem; letter-spacing: 1px; }

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 30px 40px;
  display: grid;
  grid-template-columns: repeat(var(--grid-columns, 3), 1fr);
  gap: var(--gap-spacing);
}
.glitch-title {
  grid-column: 1 / -1;
  color: var(--orange);
  font-size: 1.4rem;
  letter-spacing: 3px;
  text-align: center;
  padding: 16px 0;
  border-bottom: 2px solid var(--panel-border);
  margin-bottom: 10px;
}

.data-block {
  background: var(--bg);
  border: 1px solid var(--panel-border);
  overflow: hidden;
  position: relative;
  opacity: 0;
  animation: fadeIn 0.6s ease forwards;
  animation-delay: calc(var(--entry-delay) + var(--i, 0) * 150ms);
  transition: transform var(--anim-speed) ease, box-shadow var(--anim-speed) ease;
}
.data-block::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: var(--cyan);
  opacity: 0.5;
}
.data-block:hover {
  transform: scale(var(--hover-scale));
  box-shadow: 0 0 20px rgba(0, 240, 255, var(--hover-glow));
  border-color: var(--cyan);
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.product-img {
  width: 100%;
  aspect-ratio: 1/1;
  overflow: hidden;
  background: var(--bg);
  border-bottom: 1px solid var(--panel-border);
}
.product-img img, .product-img video {
  width: 100%; height: 100%;
  object-fit: cover;
  filter: contrast(0.9);
  transition: filter 0.3s ease;
}
.data-block:hover .product-img img,
.data-block:hover .product-img video {
  filter: contrast(1.05) brightness(1.05);
}
.data-info { padding: 12px 14px; }
.product-title {
  color: var(--cyan);
  font-size: 0.85rem;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.data-description {
  color: var(--text-dim);
  font-size: 0.7rem;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
  line-height: var(--line-height);
}
.data-price {
  color: var(--orange);
  font-size: 0.95rem;
  letter-spacing: 1px;
  margin-bottom: 10px;
}
.buy-button {
  display: inline-block;
  padding: 6px 14px;
  border: 1px solid var(--cyan);
  color: var(--cyan);
  text-decoration: none;
  font-size: 0.65rem;
  letter-spacing: 1px;
  transition: all 0.2s ease;
  background: transparent;
  cursor: pointer;
  font-family: var(--font-family);
}
.buy-button:hover { background: var(--cyan); color: var(--bg); }

#editor-interface {
  position: fixed;
  top: 72px;
  right: 16px;
  z-index: 1000;
  width: 310px;
  max-height: calc(100vh - 120px);
  background: var(--panel-bg);
  border: 1px solid var(--panel-border);
  font-size: 0.7rem;
  display: flex;
  flex-direction: column;
}
#editor-header {
  background: var(--bg);
  padding: 7px 10px;
  cursor: move;
  user-select: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--panel-border);
  flex-shrink: 0;
}
#editor-header span { color: var(--cyan); font-size: 0.6rem; letter-spacing: 1px; text-transform: uppercase; }
#editor-header button {
  background: none;
  border: 1px solid var(--text-dim);
  color: var(--text-dim);
  cursor: pointer;
  font-family: inherit;
  font-size: 0.55rem;
  padding: 1px 6px;
}
#editor-header button:hover { border-color: var(--cyan); color: var(--cyan); }

#section-select {
  width: 100%;
  padding: 6px 8px;
  background: var(--bg);
  border: none;
  border-bottom: 1px solid var(--panel-border);
  color: var(--text);
  font-family: inherit;
  font-size: 0.6rem;
  cursor: pointer;
  outline: none;
  flex-shrink: 0;
}
#section-select option { background: var(--bg); }

#editor-body {
  padding: 10px;
  overflow-y: auto;
  flex: 1;
}

.control-group { margin-bottom: 10px; }
.control-group:last-child { margin-bottom: 0; }
.control-group label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--text-dim);
  font-size: 0.6rem;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.control-group label .val { color: var(--cyan); font-size: 0.6rem; }

input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 2px;
  background: var(--panel-border);
  border: none;
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  background: var(--cyan);
  cursor: pointer;
}
input[type=range]::-moz-range-thumb {
  width: 12px; height: 12px;
  background: var(--cyan);
  cursor: pointer;
  border: none;
  border-radius: 0;
}

input[type=color] {
  -webkit-appearance: none;
  width: 100%;
  height: 22px;
  border: 1px solid var(--panel-border);
  background: var(--bg);
  cursor: pointer;
  padding: 0;
}
input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
input[type=color]::-webkit-color-swatch { border: none; }
input[type=color]::-moz-color-swatch { border: none; }

select.font-select {
  width: 100%;
  padding: 5px 6px;
  background: var(--bg);
  border: 1px solid var(--panel-border);
  color: var(--text);
  font-family: inherit;
  font-size: 0.6rem;
  cursor: pointer;
  outline: none;
}
select.font-select:focus { border-color: var(--cyan); }

.knob-container { display: flex; flex-direction: column; align-items: center; }
.knob-label { color: var(--text-dim); font-size: 0.55rem; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 4px; }
.knob-wrap { display: flex; align-items: center; gap: 8px; }
.knob {
  width: 40px; height: 40px;
  border: 1px solid var(--panel-border);
  background: var(--bg);
  position: relative;
  cursor: ns-resize;
  flex-shrink: 0;
}
.knob-center {
  position: absolute;
  width: 6px; height: 6px;
  background: var(--panel-border);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
}
.knob-indicator {
  position: absolute;
  width: 1px; height: 14px;
  background: var(--cyan);
  bottom: 50%; left: 50%;
  transform-origin: bottom center;
  transform: translateX(-50%) rotate(-90deg);
}
.knob-value { color: var(--cyan); font-size: 0.6rem; min-width: 35px; text-align: center; }

.speed-group { display: flex; gap: 2px; }
.speed-btn {
  flex: 1;
  padding: 4px 0;
  background: var(--bg);
  border: 1px solid var(--panel-border);
  color: var(--text-dim);
  cursor: pointer;
  font-family: inherit;
  font-size: 0.55rem;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  transition: all 0.15s;
}
.speed-btn:hover { border-color: var(--text); }
.speed-btn.active { background: var(--cyan); border-color: var(--cyan); color: var(--bg); }

#editor-body select:not(#section-select):not(.font-select) {
  width: 100%;
  padding: 5px 6px;
  background: var(--bg);
  border: 1px solid var(--panel-border);
  color: var(--text);
  font-family: inherit;
  font-size: 0.6rem;
  cursor: pointer;
  outline: none;
  margin-bottom: 8px;
}
.field-group { margin-bottom: 6px; }
.field-group label {
  display: block;
  color: var(--text-dim);
  font-size: 0.55rem;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.field-group input, .field-group textarea {
  width: 100%;
  padding: 5px 8px;
  background: var(--bg);
  border: 1px solid var(--panel-border);
  color: var(--text);
  font-family: inherit;
  font-size: 0.6rem;
  outline: none;
}
.field-group input:focus,
.field-group textarea:focus,
.control-group input[type=text]:focus { border-color: var(--cyan); }

.dragover-active {
  border-color: var(--cyan) !important;
  background: rgba(0,255,65,0.07) !important;
  outline: 1px solid var(--cyan);
}

.update-btn {
  width: 100%;
  padding: 7px 0;
  background: var(--bg);
  border: 1px solid var(--cyan);
  color: var(--cyan);
  cursor: pointer;
  font-family: inherit;
  font-size: 0.6rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.2s;
  margin-top: 4px;
}
.update-btn:hover { background: var(--cyan); color: var(--bg); }

.control-group input[type=text] {
  width: 100%;
  padding: 5px 8px;
  background: var(--bg);
  border: 1px solid var(--panel-border);
  color: var(--text);
  font-family: inherit;
  font-size: 0.55rem;
  outline: none;
  margin-top: 2px;
}

.section-divider {
  border: none;
  border-top: 1px solid var(--panel-border);
  margin: 8px 0;
}

#action-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 42px;
  background: var(--bg);
  border-top: 2px solid var(--panel-border);
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  z-index: 2000;
  padding: 0 16px;
}
.action-btn {
  padding: 7px 16px;
  border: 1px solid var(--panel-border);
  background: var(--bg);
  color: var(--text-dim);
  cursor: pointer;
  font-family: inherit;
  font-size: 0.6rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.15s;
}
.action-btn:hover { border-color: var(--text); color: var(--text); }
.action-btn.save { border-color: var(--orange); color: var(--orange); }
.action-btn.save:hover { background: var(--orange); color: var(--bg); }

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.92);
  z-index: 3000;
  display: none;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--panel-bg);
  border: 1px solid var(--orange);
  width: 100%;
  max-width: 800px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid var(--panel-border);
}
.modal-header h3 { color: var(--orange); font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; }
.modal-close {
  background: none;
  border: 1px solid var(--text-dim);
  color: var(--text-dim);
  cursor: pointer;
  font-family: inherit;
  font-size: 0.6rem;
  padding: 3px 10px;
}
.modal-close:hover { border-color: var(--orange); color: var(--orange); }
.modal-body { flex: 1; overflow: auto; }
.modal-body textarea {
  width: 100%;
  height: 350px;
  background: var(--bg);
  border: none;
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  padding: 12px;
  resize: vertical;
  outline: none;
  white-space: pre;
  overflow-x: auto;
}
.modal-footer {
  padding: 10px 14px;
  border-top: 1px solid var(--panel-border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}
.copy-btn {
  padding: 6px 16px;
  border: 1px solid var(--cyan);
  background: var(--bg);
  color: var(--cyan);
  cursor: pointer;
  font-family: inherit;
  font-size: 0.6rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: all 0.2s;
}
.copy-btn:hover { background: var(--cyan); color: var(--bg); }

.product-detail { display: flex; gap: 24px; padding: 20px; }
.product-detail .detail-img {
  width: 300px; height: 300px;
  flex-shrink: 0;
  border: 1px solid var(--panel-border);
  background: var(--bg);
}
.product-detail .detail-img img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.product-detail .detail-info { flex: 1; display: flex; flex-direction: column; gap: 12px; }
.product-detail .detail-info h2 { color: var(--cyan); font-size: 1.1rem; letter-spacing: 2px; }
.product-detail .detail-info .detail-price { color: var(--orange); font-size: 1.3rem; letter-spacing: 2px; }
.product-detail .detail-info .detail-meta { color: var(--text-dim); font-size: 0.7rem; letter-spacing: 1px; line-height: 1.8; }
.product-detail .detail-info .detail-status {
  display: inline-block;
  padding: 4px 12px;
  border: 1px solid var(--cyan);
  color: var(--cyan);
  font-size: 0.65rem;
  letter-spacing: 2px;
  align-self: flex-start;
}
.product-detail .detail-info .detail-buy {
  margin-top: auto;
  padding: 10px 24px;
  background: transparent;
  border: 1px solid var(--orange);
  color: var(--orange);
  cursor: pointer;
  font-family: inherit;
  font-size: 0.8rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  transition: all 0.2s;
  align-self: flex-start;
}
.product-detail .detail-info .detail-buy:hover { background: var(--orange); color: var(--bg); }

.detail-gallery {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  padding: 0 20px 20px;
}
.detail-gallery img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  border: 1px solid var(--panel-border);
  cursor: pointer;
  transition: border-color 0.2s;
}
.detail-wallet {
  margin-top: auto;
  padding: 12px;
  border: 1px solid var(--panel-border);
  background: var(--bg);
  font-size: 0.6rem;
  line-height: 1.8;
}
.detail-wallet .w-label { color: var(--orange); letter-spacing: 1px; }
.detail-wallet .w-addr {
  color: var(--cyan);
  word-break: break-all;
  cursor: pointer;
  display: block;
  padding: 2px 0 8px;
}
.detail-wallet .w-addr:hover { color: var(--orange); }
.detail-gallery img:hover { border-color: var(--cyan); }
.detail-gallery img.active { border-color: var(--orange); }

.detail-body { display: flex; flex-direction: column; }

.section-page { padding-bottom: 40px; }

.mask-overlay {
  position: fixed; inset: 0;
  z-index: 9999;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: opacity 0.4s ease;
}
.mask-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}
.mask-overlay img, .mask-overlay video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

/* === MODE PARTAGE — cache editor et barre d'actions === */
.shared-view #editor-interface,
.shared-view #action-bar { display: none !important; }

/* === TOUT VISIBLE === */
</style>
</head>
<body>
<div id="bg-overlay"></div>
<div class="mask-overlay hidden" id="maskOverlay">
  <div id="maskContent"></div>
</div>

<header class="glitch-header">
  <div class="header-data">
    <span class="header-text">[NEOMORPH] v3.1</span>
    <span class="header-text">// SYSTEM ACTIVE</span>
  </div>
  <div class="header-data">
    <span class="header-text">EDITOR MODE</span>
  </div>
  <div class="header-data" style="gap:16px">
    <a href="#services" class="header-text" style="text-decoration:none;cursor:pointer">SERVICES</a>
    <a href="#contact" class="header-text" style="text-decoration:none;cursor:pointer">CONTACT</a>
  </div>
</header>

<main class="container" id="products">
  <h2 class="glitch-title">// INVENTORY LOADED //</h2>
  <div class="logo-square" id="headerLogo">
    <img src="" alt="logo" id="logoImg">
  </div>
</main>

<section class="container section-page" id="services">
  <h2 class="glitch-title">// SERVICES //</h2>
</section>

<section class="container section-page" id="contact">
  <h2 class="glitch-title">// CONTACT //</h2>
</section>

<div id="editor-interface">
  <div id="editor-header">
    <span>EDITOR // PARAMÈTRES</span>
    <button id="editorClose">✕</button>
  </div>
  <div id="editor-body">

    <div class="section active" id="sec-config">
      <div class="control-group">
        <label>Colonnes <span class="val" id="val-gridColumns">3</span></label>
        <input type="range" id="ctrl-gridColumns" min="2" max="4" step="1" value="3">
      </div>
      <div class="control-group">
        <label>Espacement <span class="val" id="val-gapSpacing">30px</span></label>
        <input type="range" id="ctrl-gapSpacing" min="10" max="100" step="2" value="30">
      </div>
      <div class="control-group">
        <label>Taille texte <span class="val" id="val-fontSize">1.00rem</span></label>
        <input type="range" id="ctrl-fontSize" min="0.6" max="2" step="0.05" value="1">
      </div>
      <div class="control-group">
        <label>Interligne <span class="val" id="val-lineHeight">1.50</span></label>
        <input type="range" id="ctrl-lineHeight" min="1" max="2.5" step="0.05" value="1.5">
      </div>
    </div>

    <div class="section" id="sec-anim">
      <div class="control-group">
        <label>Délai d'entrée <span class="val" id="val-entryDelay">0ms</span></label>
        <input type="range" id="ctrl-entryDelay" min="0" max="2000" step="50" value="0">
      </div>
      <div class="control-group">
        <div class="knob-container">
          <div class="knob-label">Zoom au survol</div>
          <div class="knob-wrap">
            <div class="knob" id="knob-hoverScale" data-min="1" data-max="1.2" data-value="1.05" data-step="0.005">
              <div class="knob-center"></div>
              <div class="knob-indicator"></div>
            </div>
            <span class="knob-value" id="val-hoverScale">1.05</span>
          </div>
        </div>
      </div>
      <div class="control-group">
        <div class="knob-container">
          <div class="knob-label">Intensité glow</div>
          <div class="knob-wrap">
            <div class="knob" id="knob-hoverGlow" data-min="0" data-max="1" data-value="0.3" data-step="0.02">
              <div class="knob-center"></div>
              <div class="knob-indicator"></div>
            </div>
            <span class="knob-value" id="val-hoverGlow">0.30</span>
          </div>
        </div>
      </div>
      <div class="control-group">
        <label>Vitesse animation</label>
        <div class="speed-group" id="speedGroup">
          <button class="speed-btn" data-speed="0.1">Rapide</button>
          <button class="speed-btn active" data-speed="0.3">Moyen</button>
          <button class="speed-btn" data-speed="0.6">Lent</button>
        </div>
      </div>
    </div>

  } else {
    r.style.setProperty('--bg-image', 'none');
    bgEl.classList.remove('has-image');
  }
  const logoWrap = document.getElementById('headerLogo');
  const logoImg  = document.getElementById('logoImg');
  if (logoWrap && logoImg) {
    if (s.logoUrl) {
      logoImg.src = s.logoUrl;
      logoWrap.classList.add('show');
    } else {
      logoImg.src = '';
      logoWrap.classList.remove('show');
    }
  }
  const maskEl = document.getElementById('maskOverlay');
  const maskContent = document.getElementById('maskContent');
  if (maskEl && maskContent) {
    if (s.maskUrl && s.maskEnabled) {
      const isVideo = /\.(mp4|webm|ogg|mov)$/i.test(s.maskUrl);
      if (isVideo) {
        maskContent.innerHTML = `<video src="${s.maskUrl}" muted playsinline></video>`;
        const v = maskContent.querySelector('video');
        if (v) {
          v.addEventListener('loadedmetadata', () => {
            setTimeout(() => { if (!maskEl.classList.contains('hidden')) maskEl.classList.add('hidden'); }, (Math.max(0, v.duration - 2)) * 1000);
          });
          v.addEventListener('canplay', () => v.play().catch(() => {}));
          v.addEventListener('ended', () => maskEl.classList.add('hidden'));
          v.addEventListener('error', () => maskEl.classList.add('hidden'));
          v.addEventListener('ended', () => maskEl.classList.add('hidden'));
          v.addEventListener('error', () => maskEl.classList.add('hidden'));

    } else {

    }

  document.getElementById('val-gapSpacing').textContent   = s.gapSpacing + 'px';

function setupDragDrop() {
  const ids = ['ctrl-logoUrl', 'ctrl-bgImageUrl', 'ctrl-maskUrl', 'unitImg', 'unitGallery'];
  const keySettings = { 'ctrl-logoUrl': 'logoUrl', 'ctrl-bgImageUrl': 'bgImageUrl', 'ctrl-maskUrl': 'maskUrl' };
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('dragover-active'); });
    el.addEventListener('dragleave', () => el.classList.remove('dragover-active'));
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.classList.remove('dragover-active');
      const files = e.dataTransfer.files;
      if (!files.length) return;

      if (id === 'unitGallery') {
        let pending = 0;
        const lines = el.value ? el.value.trim().split('\n').map(s => s.trim()).filter(Boolean) : [];
        for (const file of files) {
          if (!file.type.startsWith('image/')) continue;
          pending++;
          const reader = new FileReader();
          reader.onload = () => {
            lines.push(reader.result);
            if (--pending === 0) el.value = lines.join('\n');
          };
          reader.readAsDataURL(file);
        }
        return;
      }

      const file = files[0];
      if (!file || !file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = () => {
        const dataUrl = reader.result;
        el.value = dataUrl;
        if (keySettings[id]) {
          settings[keySettings[id]] = dataUrl;
          applySettings();
        }
        if (id === 'unitImg') {
          const idx = parseInt(document.getElementById('unitSelector').value);
          if (!isNaN(idx)) {
            products[idx].img = dataUrl;
            renderProducts();
            populateSelector();
            document.getElementById('unitSelector').value = idx;
          }
        }
      };
      reader.readAsDataURL(file);
    });
  });
}

function setupKnobs() {
  document.querySelectorAll('.knob').forEach(knob => {
    const key = knob.id.replace('knob-', '');
    const min  = parseFloat(knob.dataset.min);
    const max  = parseFloat(knob.dataset.max);
    const step = parseFloat(knob.dataset.step);
    let value  = parseFloat(knob.dataset.value);
    let dragging = false, startY = 0, startVal = 0;

    function updateKnob(v) {
      v = Math.max(min, Math.min(max, parseFloat(v.toFixed(4))));
      value = v;
      knob.dataset.value = v;
      const pct = (v - min) / (max - min);
      const deg = -135 + pct * 270;
      knob.querySelector('.knob-indicator').style.transform = `translateX(-50%) rotate(${deg}deg)`;
      document.getElementById('val-' + key).textContent = v.toFixed(2);
      settings[key] = v;
      applySettings();
    }

    knob.addEventListener('mousedown', e => {
      dragging = true;
      startY   = e.clientY;
      startVal = value;
      e.preventDefault();
    });
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      const delta  = (startY - e.clientY) * 0.005;
      const newVal = startVal + delta * (max - min);
      const snapped = Math.round(newVal / step) * step;
      updateKnob(snapped);
    });
    document.addEventListener('mouseup', () => { dragging = false; });
    knob.addEventListener('wheel', e => {
      e.preventDefault();
      const dir = e.deltaY > 0 ? -1 : 1;
      updateKnob(Math.round((value + dir * step * 3) / step) * step);
    });
    updateKnob(value);
  });
}

function setupEditorDrag() {
  const panel  = document.getElementById('editor-interface');
  const header = document.getElementById('editor-header');
  let drag = false, sx, sy, px, py;

  header.addEventListener('mousedown', e => {
    if (e.target.tagName === 'BUTTON') return;
    drag = true;
    sx = e.clientX; sy = e.clientY;
    const r = panel.getBoundingClientRect();
    px = r.left; py = r.top;
    panel.style.right = 'auto';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!drag) return;
    panel.style.left = (px + e.clientX - sx) + 'px';
    panel.style.top  = (py + e.clientY - sy) + 'px';
  });
  document.addEventListener('mouseup', () => { drag = false; });
}

function setupEditorToggle() {
  const panel = document.getElementById('editor-interface');
  document.getElementById('editorClose').addEventListener('click', () => {
    panel.style.display = 'none';
  });
  document.addEventListener('keydown', e => {
    if ((e.key === 'Escape' || (e.ctrlKey && e.key === 'e')) && (panel.style.display === 'none' || panel.style.display === '')) {
      e.preventDefault();
      panel.style.display = 'flex';
    } else if (e.ctrlKey && e.key === 'e' && panel.style.display !== 'none') {
      e.preventDefault();
      panel.style.display = 'none';
    } else if (e.ctrlKey && e.key === 's') {
      e.preventDefault();
      saveEditorState();
    }
  });
}

function loadUnitToEditor(idx) {

  document.getElementById('unitSource').value = p.source;
  document.getElementById('unitStatus').value = p.status;
  document.getElementById('unitImg').value    = p.img;

    const folder = p.img.substring(0, p.img.lastIndexOf('/'));
    const lines = [];
    for (let i = 1; i <= 4; i++) lines.push(`${folder}/angle${i}.jpg`);

function setupProductDetail() {
  const modal = document.getElementById('productModal');
  const close = document.getElementById('productModalClose');
  const detail = document.getElementById('productDetail');
  const gallery = document.getElementById('productGallery');

  close.addEventListener('click', () => modal.classList.remove('open'));
  modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

  document.getElementById('products').addEventListener('click', e => {
    const btn = e.target.closest('.buy-button');
    if (!btn) return;
    const idx = parseInt(btn.dataset.index);
    const p = products[idx];

    const allImgs = [];
    if (p.gallery) {
      p.gallery.split('\n').map(s => s.trim()).filter(Boolean).forEach(url => allImgs.push(url));
    }

    function isVid(url) { return /\.(mp4|webm|ogg|mov)$/i.test(url); }

    function showImg(src) {
      const container = detail.querySelector('.detail-img');
      if (isVid(src)) {
        container.innerHTML = `<video src="${src}" muted playsinline autoplay loop></video>`;
      } else {
        container.innerHTML = `<img src="${src}" alt="">`;
      }
      gallery.querySelectorAll('img').forEach(im => im.classList.toggle('active', im.dataset.src === src));
    }

    const hasWallet = p.btc || p.eth || p.usdt;

    detail.innerHTML = `
      <div class="detail-img">${isVid(p.img) ? `<video src="${p.img}" muted playsinline autoplay loop></video>` : `<img src="${p.img}" alt="${p.name}">`}</div>
      <div class="detail-info">
        <h2>// ${p.name} //</h2>
        <div class="detail-price">${p.price}</div>
        <div class="detail-meta">
          UNITÉ: ${p.id}<br>
          MATIÈRE: ${p.source}<br>
          STATUT: ${p.status}
        </div>
        <div class="detail-status">${p.status}</div>
        ${hasWallet ? `<button class="detail-buy">CONFIRMER LA COMMANDE</button>` : ''}
      </div>`;

    gallery.innerHTML = allImgs.map((src, i) =>
      `<img src="${src}" data-src="${src}" class="${i === 0 ? 'active' : ''}" alt="vue ${i + 1}">`
    ).join('');

    gallery.addEventListener('click', e => {
      const img = e.target.closest('img');
      if (img) showImg(img.dataset.src);
    });

    const buyBtn = detail.querySelector('.detail-buy');
    if (buyBtn) {
      buyBtn.addEventListener('click', () => {
        const wallet = detail.querySelector('.detail-wallet');
        if (wallet) { wallet.remove(); buyBtn.textContent = 'COMMANDE ENVOYÉE'; return; }
        const div = document.createElement('div');
        div.className = 'detail-wallet';
        div.innerHTML = [
          p.btc  ? `<div class="w-label">BTC</div><div class="w-addr">${p.btc}</div>` : '',
          p.eth  ? `<div class="w-label">ETH</div><div class="w-addr">${p.eth}</div>` : '',
          p.usdt ? `<div class="w-label">USDT (TRC20)</div><div class="w-addr">${p.usdt}</div>` : ''
        ].join('');
        div.addEventListener('click', e => {
          const addr = e.target.closest('.w-addr');
          if (addr) {
            const text = addr.textContent.replace(' ✓', '');
            if (navigator.clipboard) { navigator.clipboard.writeText(text); } else { const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }
            addr.textContent += ' ✓';
            setTimeout(() => addr.textContent = addr.textContent.replace(' ✓', ''), 1500);
          }
        });
        detail.querySelector('.detail-info').appendChild(div);
        buyBtn.textContent = 'CACHER';
      });
    }

    modal.classList.add('open');
  });
}

function setupExport() {

  document.getElementById('ctrl-maskUrl').value       = s.maskUrl;
  document.querySelectorAll('#maskToggleGroup .speed-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('#maskToggleGroup .speed-btn[data-mask="' + (s.maskEnabled ? 'on' : 'off') + '"]').classList.add('active');
  document.querySelectorAll('.knob').forEach(knob => {
    const key = knob.id.replace('knob-', '');
    knob.dataset.value = s[key];
    const min = parseFloat(knob.dataset.min);
    const max = parseFloat(knob.dataset.max);
    const pct = (s[key] - min) / (max - min);
    knob.querySelector('.knob-indicator').style.transform =
      `translateX(-50%) rotate(${-135 + pct * 270}deg)`;
  });
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.speed-btn[data-speed="${s.animSpeed}"]`).classList.add('active');
}

  localStorage.setItem('neo_products', JSON.stringify(products));
  localStorage.setItem('neo_services', JSON.stringify(services));
  localStorage.setItem('neo_contact', JSON.stringify(contact));
  const btn = document.getElementById('btnExport');
  const orig = btn.textContent;
  btn.textContent = '[ SAUVEGARDÉ ✓ ]';
  setTimeout(() => btn.textContent = orig, 1200);
}

function loadEditorState() {
  const hash = window.location.hash;
  if (hash.startsWith('#share=')) {
    try {
      const raw = decodeURIComponent(hash.slice(7));
      const data = JSON.parse(raw);
      if (data.s) { settings = data.s; Object.keys(defaults).forEach(k => { if (settings[k] === undefined) settings[k] = defaults[k]; }); }
      if (data.p) { data.p.forEach((item, i) => { if (products[i]) Object.assign(products[i], item); }); }
      if (data.sv) { services = data.sv; }
      if (data.c) { contact = data.c; }
      document.documentElement.classList.add('shared-view');
      history.replaceState(null, '', window.location.pathname);
      return;
    } catch (_) {}
  }
  const s = localStorage.getItem('neo_settings');
  const p = localStorage.getItem('neo_products');
  const sv = localStorage.getItem('neo_services');
  const c = localStorage.getItem('neo_contact');
  if (s) { settings = JSON.parse(s); Object.keys(defaults).forEach(k => { if (settings[k] === undefined) settings[k] = defaults[k]; }); }
  if (p) { const parsed = JSON.parse(p); parsed.forEach((item, i) => { if (products[i]) Object.assign(products[i], item); }); }
  if (sv) { services = JSON.parse(sv); }
  if (c) { contact = JSON.parse(c); }
}

function setupShare() {
  document.getElementById('btnShare').addEventListener('click', () => {
    const data = { s: settings, p: products, sv: services, c: contact };
    const json = JSON.stringify(data);
    const encoded = encodeURIComponent(json);
    const url = window.location.origin + window.location.pathname + '#share=' + encoded;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('btnShare');
        const orig = btn.textContent;
        btn.textContent = '[ LIEN COPIÉ ✓ ]';
        setTimeout(() => btn.textContent = orig, 2000);
      });
    } else {
      const ta = document.createElement('textarea');
      ta.value = url;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
      alert('Lien copié dans le presse-papier !');
    }
  });
}

function init() {
  loadEditorState();
  renderProducts();
  renderServices();
  renderContact();
  populateSelector();
  populateServiceSelector();
  loadUnitToEditor(0);
  loadServiceToEditor(0);
  document.getElementById('contactEmail').value = contact.email;
  document.getElementById('contactAddress').value = contact.address;
  document.getElementById('contactHours').value = contact.hours;
  setupSliders();
  setupColorTypo();
  setupDragDrop();
  setupKnobs();
  setupSpeedButtons();
  setupEditorDrag();
  setupUnitPanel();
  setupServicePanel();
  setupContactPanel();
  setupEditorToggle();
  setupProductDetail();
  setupExport();
  setupShare();
  setupReset();
  document.getElementById('maskOverlay').addEventListener('click', function() { this.classList.add('hidden'); const v = this.querySelector('video'); if (v) v.pause(); });
  applySettings();
  syncEditorControls();
}

document.addEventListener('DOMContentLoaded', init);
</script>
